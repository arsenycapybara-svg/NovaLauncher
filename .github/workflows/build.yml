name: Build Launcher
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем всё из созданного тобой requirements.txt
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build with PyInstaller
        run: |
          # Добавили --hidden-import для верности
          pyinstaller --noconsole --onefile --hidden-import=PyQt6 --add-data "assets;assets" main.py
          
      - uses: actions/upload-artifact@v4
        with:
          name: NovaLauncher-Windows
          path: dist/main.exe
