name: Build Launcher
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем библиотеку из файла
          pip install -r requirements.txt
          # Устанавливаем PyInstaller для сборки
          pip install pyinstaller
          
      - name: Build with PyInstaller
        run: |
          echo "Список установленных библиотек:"
          pip list
          echo "Начинаем сборку:"
          # Сборка в папку с полным сбором PyQt6
          pyinstaller --noconsole --collect-all PyQt6 --add-data "assets;assets" main.py
          
      - uses: actions/upload-artifact@v4
        with:
          name: NovaLauncher-Build
          path: dist/
