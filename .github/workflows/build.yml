name: Build Launcher
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build with PyInstaller
        run: |
          # Создаем базовый spec-файл
          pyi-makespec --noconsole --onefile --add-data "assets;assets" main.py
          
          # Дописываем в spec-файл автоматический поиск плагинов PyQt6
          python -c "
import os
import PyQt6
with open('main.spec', 'r') as f: spec = f.read()
plugins_path = os.path.join(os.path.dirname(PyQt6.__file__), 'Qt6', 'plugins')
new_line = f\"a.datas += Tree('{plugins_path}', prefix='PyQt6/Qt6/plugins')\"
spec = spec.replace('datas=[],', f'datas=[],\\n{new_line},')
with open('main.spec', 'w') as f: f.write(spec)
"
          # Собираем проект по готовому spec-файлу
          pyinstaller main.spec
          
      - uses: actions/upload-artifact@v4
        with:
          name: NovaLauncher-Build
          path: dist/
